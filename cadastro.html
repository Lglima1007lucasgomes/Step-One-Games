<!DOCTYPE html>
	<head>
		<html lang="pt-br">
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Cadastro Gamer</title>
		<link rel="stylesheet" href="css/style.css">
	</head>
	<body>
	<nav class="navbar">
		<h2>🎮 Step One Games</h2>
		<a href="index.html">⬅ Voltar</a>
	</nav>
		<h2 id="cadastro">Cadastro Gamer 🎮</h2>
	<form onsubmit="enviar(event)">
		<input type="text" id="nome" placeholder="Nome" required>
		<input type="email" id="email" placeholder="Email" required>
	<p>Plataforma:</p>
		<label><input type="radio" name="plataforma" value="PC"> PC</label>
		<label><input type="radio" name="plataforma" value="Play"> PlayStation 4/5</label>
		<label><input type="radio" name="plataforma" value="xbox">Xbox Series x/s</label>
		<label><input type="radio" name="plataforma" value="nintendo">Nintendo Switch 1/2</label>
    <br><br>
    <select id="nivel">
        <option>Iniciante</option>
        <option>Intermediário</option>
        <option>Avançado</option>
    </select>
    <br><br>
		<button type="submit">Cadastrar</button>
	</form>
		<p id="resultado"></p>
	<script src="js/script.js"></script>
	</body>
</html>
